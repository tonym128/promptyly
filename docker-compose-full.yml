version: '3.8'

services:
  # 1. Sharing registry server running on port 6072
  promptyly-registry:
    build:
      context: .
      dockerfile: sharing/Dockerfile
      args:
        - INCLUDE_LLAMAFILE=${INCLUDE_LLAMAFILE:-false}
    container_name: promptyly-share
    ports:
      - "6072:6072"
    volumes:
      - ./sharing/data:/app/data
    environment:
      - PORT=6072
      - DATA_DIR=/app/data
    env_file:
      - ./sharing/.env
    restart: unless-stopped

  # 2. Registry tunnel (Cloudflare Tunnel) for publishing/sharing remotely
  registry-tunnel:
    build:
      context: .
      dockerfile: sharing/Dockerfile.tunnel
    container_name: promptyly-share-tunnel
    restart: unless-stopped
    env_file:
      - ./sharing/.env
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -n "$$CLOUDFLARE_TUNNEL_TOKEN" ]; then
          exec cloudflared tunnel --no-autoupdate run --token "$$CLOUDFLARE_TUNNEL_TOKEN"
        else
          exec cloudflared tunnel --no-autoupdate --url http://promptyly-registry:6072
        fi
    depends_on:
      - promptyly-registry

  # 4. Ollama Service running on port 11434
  ollama:
    image: ollama/ollama:latest
    container_name: promptyly-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # 5. Helper container to auto-pull the DeepSeek-Coder model
  ollama-pull-model:
    image: ollama/ollama:latest
    container_name: promptyly-ollama-pull
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "sleep 3 && ollama pull deepseek-coder:1.3b-instruct"
    depends_on:
      - ollama

volumes:
  ollama-data:
