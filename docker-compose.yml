version: '3.8'

services:
  # 1. Local developer daemon running on port 6071
  promptyly-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptyly-daemon
    network_mode: "host"
    volumes:
      # Persist configuration settings
      - ${HOME}/.config/promptyly:/root/.config/promptyly
      # Persist generated applications code
      - ${HOME}/promptyly-apps:/root/promptyly-apps
    environment:
      - HOST=127.0.0.1
    restart: unless-stopped

  # 2. Sharing registry server running on port 6072
  promptyly-registry:
    build:
      context: .
      dockerfile: sharing/Dockerfile
      args:
        - INCLUDE_LLAMAFILE=${INCLUDE_LLAMAFILE:-false}
    container_name: promptyly-share
    ports:
      - "6072:6072"
    volumes:
      - ./sharing/data:/app/data
    environment:
      - PORT=6072
      - DATA_DIR=/app/data
    restart: unless-stopped

  # 3. Registry tunnel (ngrok) for publishing/sharing remotely
  registry-tunnel:
    image: ngrok/ngrok:latest
    container_name: promptyly-share-tunnel
    restart: unless-stopped
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "promptyly-registry:6072"
    depends_on:
      - promptyly-registry


