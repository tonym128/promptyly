version: '3.8'

services:
  promptyly-share:
    build:
      context: ..
      dockerfile: sharing/Dockerfile
    container_name: promptyly-share
    ports:
      - "6072:6072"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - PORT=6072
      - DATA_DIR=/app/data
