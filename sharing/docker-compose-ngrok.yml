version: '3.8'

services:
  promptyly-share:
    build:
      context: ..
      dockerfile: sharing/Dockerfile
    container_name: promptyly-share
    ports:
      - "6072:6072"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - PORT=6072
      - DATA_DIR=/app/data

  ngrok:
    image: ngrok/ngrok:latest
    container_name: promptyly-share-tunnel
    restart: unless-stopped
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "promptyly-share:6072"
    depends_on:
      - promptyly-share
